apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: demo
spec:
  schedule: "30 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: backup-tool:v2
              command:
                - ./backup.sh
              env:
                - name: DB_HOST
                  value: db.demo.svc.cluster.local
