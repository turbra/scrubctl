apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: demo
  uid: cron-202
  resourceVersion: "88"
  creationTimestamp: "2026-04-15T00:00:00Z"
  managedFields:
    - manager: kube-controller-manager
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Allow
  suspend: false
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      creationTimestamp: null
    spec:
      backoffLimit: 6
      completions: 1
      parallelism: 1
      completionMode: NonIndexed
      suspend: false
      template:
        metadata:
          creationTimestamp: null
        spec:
          schedulerName: default-scheduler
          dnsPolicy: ClusterFirst
          restartPolicy: OnFailure
          securityContext: {}
          affinity: {}
          containers:
            - name: backup
              image: backup-tool:v2
              command: ["./backup.sh"]
              env:
                - name: DB_HOST
                  value: db.demo.svc.cluster.local
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
status:
  lastScheduleTime: "2026-04-15T03:30:00Z"
  lastSuccessfulTime: "2026-04-15T03:31:00Z"
